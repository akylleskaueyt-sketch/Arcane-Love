```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Achilles & Gracinda</title>

<style>

body{
margin:0;
background:#0b0b14;
font-family:Arial;
color:white;
overflow:hidden;
}

/* FUNDO */

.zaun{
position:fixed;
left:0;
top:0;
width:50%;
height:100%;
background:url("https://media.tenor.com/9Sprv48rbTwAAAAd/zaun-arcane.gif");
background-size:cover;
opacity:0.35;
}

.piltover{
position:fixed;
right:0;
top:0;
width:50%;
height:100%;
background:url("https://media.tenor.com/jKk4o9S7Q8kAAAAd/piltover-arcane.gif");
background-size:cover;
opacity:0.35;
}

/* CONTAINER */

.container{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

h1{
color:#6df6ff;
font-size:40px;
}

/* TEXTO */

.text{
max-width:600px;
font-size:19px;
line-height:1.6;
margin:20px;
}

/* BOTÕES */

button{
background:#111827;
border:2px solid #6df6ff;
color:#6df6ff;
padding:12px 20px;
margin:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#6df6ff;
color:#000;
}

/* GIFS */

.jinx{
position:fixed;
right:40px;
bottom:20px;
width:240px;
}

.ekko{
position:fixed;
left:40px;
bottom:20px;
width:240px;
}

/* GLITCH */

.glitch{
animation:glitch 0.4s;
}

@keyframes glitch{
0%{transform:translate(0)}
25%{transform:translate(-6px,3px)}
50%{transform:translate(6px,-3px)}
75%{transform:translate(-3px,4px)}
100%{transform:translate(0)}
}

/* PIXAÇÃO EKKO */

.ekkoGraffiti{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-6deg);
font-size:50px;
font-weight:bold;
color:#00ffe1;
text-shadow:
0 0 10px #00ffe1,
0 0 20px #00ffe1,
0 0 40px #00ffe1;
opacity:0;
z-index:999;
transition:0.4s;
font-family:Impact, Arial Black;
}

.showGraffiti{
opacity:1;
animation:glitch 0.4s infinite;
}

/* TIMELINE OVERLAY */

.timelineOverlay{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:black;

display:none;

flex-direction:column;
align-items:center;
justify-content:center;

z-index:1000;

}

.timelineText{

font-size:50px;

color:#00ffe1;

text-shadow:
0 0 10px #00ffe1,
0 0 20px #00ffe1;

animation:glitch 0.3s infinite;

}

iframe{

margin-top:30px;

width:80%;
height:60%;

border:none;

}

/* glitch escondido */

.glitchMsg{

position:fixed;

bottom:20px;
right:20px;

font-size:14px;

color:#6df6ff;

opacity:0;

transition:1s;

}

</style>

</head>

<body>

<div class="zaun"></div>
<div class="piltover"></div>

<img class="jinx" src="https://media.tenor.com/jb14Mqgp9jkAAAAd/jinx-laugh.gif">
<img class="ekko" src="https://media.tenor.com/wZ38fxcRj5gAAAAC/ekko.gif">

<div class="container">

<h1>Achilles & Gracinda</h1>

<div class="text" id="text">

Às vezes parece que estamos em lados diferentes do mundo...
como Piltover e Zaun.

Mas mesmo quando o tempo quebra...

eu ainda voltaria.

Sempre.

</div>

<button onclick="next()">Continuar</button>

<button onclick="rewind()">⏪ Rewind</button>

<button onclick="startMusic()">🎵 Ma Meilleure Ennemie</button>

<button onclick="jinxMusic()">💣 Get Jinxed</button>

<button onclick="ekkoTalk()">🕒 Fala do Ekko</button>

<button onclick="showVideo()">🎬 Ver nossa cena</button>

</div>

<div class="ekkoGraffiti" id="ekkoGraffiti">

Mesmo se o tempo quebrar mil vezes...
algumas pessoas ainda valem a pena.

</div>

<div class="timelineOverlay" id="timeline">

<div class="timelineText">

em outra timeline...

</div>

<iframe id="videoFrame" allow="autoplay"></iframe>

</div>

<div class="glitchMsg" id="glitchMsg"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="rewindSound">
<source src="rewind.mp3" type="audio/mpeg">
</audio>

<audio id="jinxSong">
<source src="getjinxed.mp3" type="audio/mpeg">
</audio>

<script>

let messages = [

"Você é o meu caos favorito.",

"Mesmo quando brigamos... eu ainda escolheria você.",

"Ekko passou anos tentando consertar o tempo.",

"Mas antes disso... existia apenas Ekko e Powder.",

"Duas crianças em Zaun tentando sobreviver.",

"Eu gosto de pensar que em algum universo...",

"Ekko nunca precisou voltar no tempo.",

"E Powder nunca virou Jinx.",

"Eles só cresceram juntos.",

"Talvez seja assim em outro mundo.",

"Mas nesse mundo... eu ainda escolheria você.",

"Mesmo quando parece que estamos quebrados.",

"Porque algumas pessoas sempre valem a pena."

]

let index = 0

function next(){

index++

if(index >= messages.length) index = messages.length-1

document.getElementById("text").innerText = messages[index]

if(Math.random() < 0.25){

glitchMessage()

}

}

function rewind(){

document.getElementById("rewindSound").play()

document.body.classList.add("glitch")

setTimeout(()=>{

document.body.classList.remove("glitch")

index = 0

document.getElementById("text").innerText = messages[0]

let music = document.getElementById("music")

music.currentTime = 0

music.play()

},600)

}

function startMusic(){

let m = document.getElementById("music")
m.currentTime = 0
m.play()

}

function jinxMusic(){

let j = document.getElementById("jinxSong")
j.currentTime = 0
j.play()

}

function ekkoTalk(){

let graffiti = document.getElementById("ekkoGraffiti")

graffiti.classList.add("showGraffiti")

document.body.classList.add("glitch")

setTimeout(()=>{

graffiti.classList.remove("showGraffiti")
document.body.classList.remove("glitch")

},4000)

}

function showVideo(){

let overlay = document.getElementById("timeline")

let video = document.getElementById("videoFrame")

overlay.style.display="flex"

setTimeout(()=>{

video.src="https://www.youtube.com/embed/sZ44Wj60eSQ?autoplay=1"

},2500)

}

function glitchMessage(){

let hidden = [

"glitch: você ainda é a minha pessoa favorita",

"glitch: eu escolheria você em qualquer timeline",

"glitch: mesmo se o tempo quebrar",

"glitch: você ainda é meu lar",

"glitch: ekko tentou milhões de timelines"

]

let msg = hidden[Math.floor(Math.random()*hidden.length)]

let box = document.getElementById("glitchMsg")

box.innerText = msg

box.style.opacity="1"

setTimeout(()=>{

box.style.opacity="0"

},3000)

}

</script>

</body>
</html>
```
